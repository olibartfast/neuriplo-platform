      - neuriplo-infer v0.5.0 includes a FetchContent dependency on neuriplo-kserve-client v0.1.0 (pinned via NEURIPLO_KSERVE_CLIENT_VERSION in versions.env).
      - neuriplo-kserve-runtime is WIP and currently pinned by commit.
    repositories:
      neuriplo-tasks: v0.4.0
      neuriplo: v0.5.0
      neuriplo-infer: v0.5.0
      neuriplo-kserve-client: v0.2.0
      videocapture: v0.3.0
      neuriplo-kserve-runtime: 6a18bed6ca4cf78ba4bac824b5f939c3e6e03541
