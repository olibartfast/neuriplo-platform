cluster:
  name: neuriplo-platform
  integration_branch: develop
  release_branch: master
  source_of_truth:
    architecture_control_plane: neuriplo-platform
    task_contracts: neuriplo-tasks
    backend_abstraction: neuriplo
    local_application_flow: neuriplo-infer
    serving_runtime: neuriplo-kserve-runtime
    remote_inference_protocol: kserve-v2
    video_io: videocapture
  local_checkout_hints:
    neuriplo-platform: .
    neuriplo-tasks: ../neuriplo-tasks
    neuriplo: ../neuriplo
    neuriplo-infer: ../neuriplo-infer
    neuriplo-kserve-runtime: ../neuriplo-kserve-runtime
    videocapture: ../videocapture

repos:
  neuriplo-platform:
    repo_root: .
    role: architecture-control-plane
    provides:
      - architecture_docs
      - adrs
      - cross_repo_contracts
      - version_matrix
      - integration_test_plans
      - maintenance_runbooks
    automation_scope:
      - docs-sync
      - dependency-sync

  neuriplo-tasks:
    repo_root: ../neuriplo-tasks
    role: domain-task-layer
    provides:
      - task_factory
      - task_interface
      - preprocessing
      - postprocessing
      - result_types
    consumed_by:
      - neuriplo-infer
      - neuriplo-kserve-runtime
    automation_scope:
      - ci-triage
      - api-migration-source
      - test-fix
      - docs-sync

  neuriplo:
    repo_root: ../neuriplo
    role: backend-abstraction-layer
    provides:
      - backend_abstractions
      - backend_adapters
      - backend_version_management
      - runtime_selection
    consumed_by:
      - neuriplo-infer
      - neuriplo-kserve-runtime
    automation_scope:
      - ci-triage
      - dependency-sync
      - backend-config-fix
      - docs-sync

  neuriplo-infer:
    repo_root: ../neuriplo-infer
    role: local-application-layer
    depends_on:
      - neuriplo-tasks
      - neuriplo
      - videocapture
    mode_dependencies:
      embedded_local:
        - neuriplo-tasks
        - neuriplo
        - videocapture
      remote_kserve_client:
        - kserve-v2-protocol
    provides:
      - cli
      - app_config
      - runtime_wiring
      - visualization
      - local_e2e_execution
      - kserve_v2_client
    automation_scope:
      - ci-triage
      - downstream-api-migration
      - docs-sync
      - test-fix

  neuriplo-kserve-runtime:
    repo_root: ../neuriplo-kserve-runtime
    role: serving-runtime-layer
    depends_on:
      - neuriplo-tasks
      - neuriplo
    provides:
      - kserve_v2_protocol
      - request_admission
      - scheduling
      - dynamic_batching
      - model_lifecycle
      - operational_endpoints
    automation_scope:
      - ci-triage
      - downstream-api-migration
      - docs-sync
      - test-fix
      - runtime-contract-fix

  videocapture:
    repo_root: ../videocapture
    role: video-io
    provides:
      - source_capture
      - stream_backends
      - file_backends
      - camera_backends
    consumed_by:
      - neuriplo-infer
    automation_scope:
      - ci-triage
      - dependency-sync
      - io-regression-fix
      - docs-sync

dependency_edges:
  - from: neuriplo-infer
    to: neuriplo-tasks
    type: api
    critical_contracts:
      - task_factory model type strings
      - result variant semantics
      - tensor shape and dtype expectations
  - from: neuriplo-infer
    to: neuriplo
    type: runtime
    mode: embedded_local
    critical_contracts:
      - backend selection
      - device placement
      - dependency setup paths
  - from: neuriplo-infer
    to: videocapture
    type: io
    critical_contracts:
      - source semantics
      - backend priority
      - stream reliability
  - from: neuriplo-kserve-runtime
    to: neuriplo-tasks
    type: api
    critical_contracts:
      - task contracts
      - result serialization semantics
      - tensor shape and dtype expectations
  - from: neuriplo-kserve-runtime
    to: neuriplo
    type: runtime
    critical_contracts:
      - backend execution contract
      - capability reporting
      - runtime error normalization

protocol_edges:
  - from: neuriplo-infer
    to: kserve-v2
    type: remote_client_protocol
    mode: remote_kserve_client
    compatible_servers:
      - neuriplo-kserve-runtime
      - Triton Inference Server
      - OpenVINO Model Server
      - KServe-compatible TorchServe deployment
    critical_contracts:
      - inference request and response schema
      - model metadata schema
      - health and readiness endpoints
      - protocol-level error semantics
  - from: neuriplo-kserve-runtime
    to: kserve-v2
    type: server_protocol
    critical_contracts:
      - map protocol requests to task and backend execution
      - normalize backend capability and failure details at protocol boundary
validation_order:
  - repo_local
  - downstream_integration
  - performance_and_output_checks

agents:
  coordinator:
    responsibilities:
      - ingest_pr_ci_and_schedule_signals
      - classify_change_type
      - dispatch_repo_scoped_tasks
  repo_workers:
    - neuriplo-tasks-worker
    - neuriplo-worker
    - neuriplo-infer-worker
    - neuriplo-kserve-runtime-worker
    - videocapture-worker
  verifier:
    responsibilities:
      - run_repo_local_checks
      - run_cross_repo_compatibility_checks
      - summarize_evidence
  release_safety:
    responsibilities:
      - enforce_branch_policies
      - ensure_release_only_changes_target_release_branch
      - reject_unsafe_packaging_or_version_drift
